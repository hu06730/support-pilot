services:
  # ── 后端主服务 ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen-plus}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v3}
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-support_docs}
      - MCP_SERVER_URLS=http://mcp-server:5000
      - MCP_CONNECT_TIMEOUT=10
      - MCP_TOOL_PREFIX=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LOG_LEVEL=INFO
    volumes:
      - ./data/chroma:/app/data/chroma
      - ./data/uploads:/app/data/uploads
      - ./data/bm25_cache:/app/data/bm25_cache
    depends_on:
      - mcp-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MCP Server ──
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "5000:5000"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=5000
    restart: unless-stopped
