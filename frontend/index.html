<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupportPilot — 智能技术支持</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>🛠️ SupportPilot</h1>
            <p class="subtitle">智能技术支持 Agent — 文档问答 + 诊断工具 + MCP</p>
        </header>

        <!-- 工具栏 -->
        <div class="toolbar">
            <!-- 上传 -->
            <label for="file-input" class="upload-btn">📄 上传文档</label>
            <input type="file" id="file-input" accept=".pdf,.txt,.md,.docx" hidden>
            <span id="upload-status"></span>

            <!-- 文档管理 -->
            <button class="tool-btn" onclick="toggleDocPanel()">📚 文档管理</button>
            <!-- 清除历史 -->
            <button class="tool-btn" onclick="clearHistory()">🗑️ 清除历史</button>
        </div>

        <!-- 文档管理面板（默认隐藏） -->
        <div id="doc-panel" class="doc-panel" style="display:none;">
            <div class="doc-panel-header">
                <span>已上传文档</span>
                <button class="close-btn" onclick="toggleDocPanel()">✕</button>
            </div>
            <div id="doc-list" class="doc-list">
                <div class="doc-empty">暂无文档</div>
            </div>
        </div>

        <!-- 对话区 -->
        <div class="chat-section">
            <div id="chat-history" class="chat-history">
                <div class="message system">
                    <div class="content">你好！我是 SupportPilot 技术支持助手。你可以问我技术问题，我会先查阅文档，再用诊断工具帮你排查。</div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="user-input" placeholder="输入你的技术问题..." rows="2"></textarea>
                <button id="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
